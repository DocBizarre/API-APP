          <div class="search-results" id="ch-moteur-results"></div>
        </div>
      </div>
      <input type="hidden" id="ch-serie" value="${escHtml(it.num_serie||'')}">

      <div class="details-editor">
        <div class="details-editor-header">
          <span>📋 Champs du chapitre</span>
          <div style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-xs" onclick="addChField('text')" title="Texte libre">📝 Texte</button>
            <button class="btn btn-ghost btn-xs" onclick="addChField('date')" title="Date">📅 Date</button>
            <button class="btn btn-ghost btn-xs" onclick="addChField('measure')" title="Valeur + unité">📏 Mesure</button>
            <button class="btn btn-ghost btn-xs" onclick="addChField('check')" title="Case à cocher">✅ Coche</button>
            <button class="btn btn-ghost btn-xs" onclick="addChField('select')" title="Liste déroulante">📋 Liste</button>
            <button class="btn btn-ghost btn-xs" onclick="addChField('document')" title="Fichier/Document">📎 Document</button>
          </div>
        </div>
        <div id="ch-fields-list" style="padding:8px 4px">
          ${allDetails.length
            ? allDetails.map(d => chFieldRowHtml(fieldStyle(d), d.libelle, d.valeur||'', d.unite||'')).join('')
            : '<div id="ch-fields-empty" style="padding:6px 4px;font-size:12px;color:var(--text-muted)">Sélectionnez un type pour charger un modèle, ou ajoutez des champs manuellement.</div>'}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annuler</button>
      <button class="btn btn-primary" onclick="saveChapter()">💾 Enregistrer</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.getElementById('ch-libelle')?.focus();
  // Nouveau chapitre avec type pré-défini et aucun champ existant → appliquer le template automatiquement
  if (!editingChapterId && currentType && !allDetails.length) {
    applyChapterTemplate(currentType);
  }
  // Marquer le chip du moteur déjà lié
  if (it.num_serie) {
    const motorId = String(state.currentMoteurs.find(m => m.num_serie === it.num_serie)?.id || '');
    if (motorId) document.querySelectorAll('.moteur-chip').forEach(c =>
      c.classList.toggle('selected', c.dataset.id === motorId));
  }
}

/* ── Gestion du type de chapitre ── */
async function onChTypeChange(val, sel) {
  const customInput  = document.getElementById('ch-type-custom');
  const motorSection = document.getElementById('moteur-picker-section');

  customInput.style.display = val === '__new__' ? 'block' : 'none';
  if (val === '__new__') { customInput.value = ''; customInput.focus(); return; }

  if (motorSection) motorSection.style.display = isMotorType(val) ? 'block' : 'none';

  const tpl = val ? getTemplateForType(val) : null;

  // Si des champs sont déjà remplis, demander confirmation avant d'écraser
  if (tpl && tpl.length && _chHasFilledFields()) {
    const ok = await confirm(
      'Changer de type ?',
      `Le modèle "${val}" va remplacer les champs actuels. Continuer ?`
    );
    if (!ok) {
      if (sel) sel.value = sel.dataset.prevVal || '';
      return;
    }
  }
  if (sel) sel.dataset.prevVal = val;

  const container = document.getElementById('ch-fields-list');
  if (!container) return;
  if (tpl && tpl.length) {
    applyChapterTemplate(val);
  } else {
    container.innerHTML = '<div id="ch-fields-empty" style="padding:6px 4px;font-size:12px;color:var(--text-muted)">Sélectionnez un type pour charger un modèle, ou ajoutez des champs manuellement.</div>';
  }
}

function onCustomTypeBlur(val) {
  // Quand l'utilisateur a saisi un nom et quitte le champ, on l'ajoute à la liste
  val = val.trim();
  if (!val) return;
  const sel = document.getElementById('ch-type');
  // Chercher si déjà dans la liste
  const exists = [...sel.options].some(o => o.value === val);
  if (!exists) {
    const opt = new Option(val, val);
    sel.insertBefore(opt, sel.querySelector('option[value="__new__"]'));
  }
  sel.value = val;
  document.getElementById('ch-type-custom').style.display = 'none';
  onChTypeChange(val);
}

/* ── Gestion du type dans le modal sous-ensemble ── */
function onSeTypeChange(val) {
  const customInput = document.getElementById('se-type-custom');
  customInput.style.display = val === '__new__' ? 'block' : 'none';
  if (val === '__new__') { customInput.value = ''; customInput.focus(); }
}

function onSeTypeCustomBlur(val) {
  val = val.trim();
  if (!val) return;
  const sel = document.getElementById('se-type');
  const exists = [...sel.options].some(o => o.value === val);
  if (!exists) {
    const opt = new Option(val, val);
    sel.insertBefore(opt, sel.querySelector('option[value="__new__"]'));
    saveCustomType(val);
  }
  sel.value = val;
  document.getElementById('se-type-custom').style.display = 'none';
}

/* ── Champs de chapitre (liste unifiée) ── */
function chFieldRowHtml(style, libelle, valeur, unite) {
  style = style || 'text'; libelle = libelle || ''; valeur = valeur || ''; unite = unite || '';
  let inputHtml;
  if (style === 'date') {
    inputHtml = `<input type="date" class="ch-field-val form-control" value="${escHtml(valeur)}" style="flex:1;font-size:13px">`;
  } else if (style === 'check') {
    const checked = valeur === 'true' ? 'checked' : '';
    inputHtml = `<label style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;padding:6px 0">
      <input type="checkbox" class="ch-field-val" ${checked}
        onchange="this.nextElementSibling.textContent=this.checked?'Oui':'Non'"
        style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
      <span style="font-size:13px;color:var(--text-muted)">${valeur === 'true' ? 'Oui' : 'Non'}</span>
    </label>`;
  } else if (style === 'measure') {
    inputHtml = `<input type="text" class="ch-field-val form-control" placeholder="Valeur" value="${escHtml(valeur)}" style="flex:1;font-size:13px;min-width:60px">
      <input type="text" class="ch-field-unit form-control" placeholder="Unité" value="${escHtml(unite)}" style="flex:none;width:76px;font-size:13px">`;
  } else if (style === 'select') {
    const opts = parseSelectOpts(unite);
    inputHtml = `<div style="flex:1;display:flex;flex-direction:column;gap:3px">
      <select class="ch-field-val form-control" style="font-size:13px">
        <option value="">— Choisir —</option>
        ${opts.map(o => `<option${o===valeur?' selected':''}>${escHtml(o)}</option>`).join('')}
      </select>
      <input type="text" class="ch-field-unit form-control" placeholder="Options : Opt 1 | Opt 2 | Opt 3"
        value="${escHtml(unite)}" style="font-size:11px;color:var(--text-muted)"
        oninput="refreshChSelectOpts(this)">
    </div>`;
  } else if (style === 'document') {
    inputHtml = `<div style="flex:1;display:flex;flex-direction:column;gap:3px">
      <div style="display:flex;align-items:center;gap:5px">
        <input type="text" class="ch-field-val form-control" value="${escHtml(valeur)}"
          placeholder="Aucun fichier sélectionné" readonly
          style="flex:1;font-size:13px;background:#fafbfc;cursor:default" title="${escHtml(valeur)||'Nom du fichier'}">
        <label class="btn btn-secondary btn-xs" style="cursor:pointer;margin:0;flex-shrink:0;white-space:nowrap" title="Choisir un fichier à joindre">
          📎 Parcourir
          <input type="file" style="display:none" onchange="chDocFieldSelect(this)">
        </label>
      </div>
      <div class="ch-doc-hint" style="font-size:11px;color:var(--text-muted)">${valeur ? '' : 'Le fichier sera déposé dans le dossier du chapitre à l\'enregistrement.'}</div>
    </div>`;
  } else {
    inputHtml = `<textarea class="ch-field-val form-control" rows="2" placeholder="Contenu…"
      style="flex:1;font-size:13px;resize:vertical">${escHtml(valeur)}</textarea>`;
  }
  return `<div class="ch-field-row" data-style="${escHtml(style)}"
    style="display:flex;align-items:flex-start;gap:6px;margin-bottom:8px">
    <select class="form-control ch-field-type" style="width:108px;flex-shrink:0;font-size:12px;padding:5px 6px;align-self:flex-start"
      onchange="onChFieldTypeChange(this)">
      <option value="text"    ${style==='text'   ?'selected':''}>📝 Texte</option>
      <option value="date"    ${style==='date'   ?'selected':''}>📅 Date</option>
      <option value="measure" ${style==='measure'?'selected':''}>📏 Mesure</option>
      <option value="check"   ${style==='check'  ?'selected':''}>✅ Coche</option>
      <option value="select"    ${style==='select'   ?'selected':''}>📋 Liste</option>
      <option value="document"  ${style==='document' ?'selected':''}>📎 Document</option>
    </select>
    <input class="ch-field-label form-control" placeholder="Libellé" value="${escHtml(libelle)}"
      style="width:150px;flex-shrink:0;align-self:flex-start;font-size:13px">
    ${inputHtml}
    <button class="btn-rm-detail" onclick="this.closest('.ch-field-row').remove()"
      style="align-self:flex-start;margin-top:3px">✕</button>
  </div>`;
}

function onChFieldTypeChange(sel) {
  const row = sel.closest('.ch-field-row');
  if (!row) return;
  const label = row.querySelector('.ch-field-label')?.value || '';
  const div = document.createElement('div');
  div.innerHTML = chFieldRowHtml(sel.value, label, '', '');
  row.replaceWith(div.firstElementChild);
}

function addChField(style) {
  const container = document.getElementById('ch-fields-list');
  if (!container) return;
  document.getElementById('ch-fields-empty')?.remove();
  container.insertAdjacentHTML('beforeend', chFieldRowHtml(style || 'text', '', '', ''));
  container.querySelectorAll('.ch-field-row:last-child .ch-field-label')[0]?.focus();
}

function _chHasFilledFields() {
  for (const row of document.querySelectorAll('#ch-fields-list .ch-field-row')) {
    if (row.dataset.style === 'check') continue;
    const val = row.querySelector('.ch-field-val');
    if (val && val.value && val.value.trim()) return true;
  }
  return false;
}

function applyChapterTemplate(typeName) {
  const container = document.getElementById('ch-fields-list');
  if (!container) return;
  const fields = getTemplateForType(typeName);
  if (!fields || !fields.length) return;
  container.innerHTML = '';
  fields.forEach(f => {
    if (!f.libelle) return;
    container.insertAdjacentHTML('beforeend', chFieldRowHtml(fieldStyle(f), f.libelle, f.valeur || '', f.unite || ''));
  });
}

/* ── Sélecteur moteur dans le modal chapitre ── */
function pickLinkedMoteur(id) {
  const m = state.currentMoteurs.find(x => x.id === id);
  if (!m) return;
  const serie   = document.getElementById('ch-serie');
  const libelle = document.getElementById('ch-libelle');
  if (serie)   serie.value  = m.num_serie || '';
  if (libelle && !libelle.value) libelle.value = [m.marque, m.type_moteur].filter(Boolean).join(' ');
  document.querySelectorAll('.moteur-chip').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === id));
}

async function searchMoteursInChapter(q) {
  const dd = document.getElementById('ch-moteur-dd');
  const el = document.getElementById('ch-moteur-results');
  if (q.length < 2) { el.innerHTML = ''; dd.classList.remove('open'); return; }
  try {
    const res = await GET(`/moteurs?search=${encodeURIComponent(q)}`);
    if (!res.length) {
      el.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:13px">Aucun résultat</div>';
    } else {
      el.innerHTML = res.map(m => `
        <div class="moteur-search-result" onclick='pickSearchedMoteur(${JSON.stringify({
          id:m.id, num_serie:m.num_serie, marque:m.marque||'',
          ref_constructeur:m.ref_constructeur||'', type_moteur:m.type_moteur||''
        })})'>
          <span style="font-size:16px;flex-shrink:0">🔧</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${escHtml(m.num_serie)}</div>
            <div style="font-size:12px;color:var(--text-muted)">
              ${[m.marque, m.type_moteur, m.navire, m.client_nom].filter(Boolean).map(escHtml).join(' · ')}
            </div>
          </div>
          ${m.code_affaire && m.code_affaire !== state.currentAffaire.num_affaire
            ? `<span style="font-size:11px;background:var(--warning-bg);color:var(--warning);padding:2px 7px;border-radius:10px">Lié: ${escHtml(m.code_affaire)}</span>`:''}
        </div>`).join('');
    }
    dd.classList.add('open');
  } catch(e) {}
}

function pickSearchedMoteur(m) {
  const serie   = document.getElementById('ch-serie');
  const libelle = document.getElementById('ch-libelle');
  if (serie)   serie.value  = m.num_serie || '';
  if (libelle && !libelle.value) libelle.value = [m.marque, m.type_moteur].filter(Boolean).join(' ');
  document.getElementById('ch-moteur-search').value = m.num_serie;
  document.getElementById('ch-moteur-dd').classList.remove('open');
}

function parseSelectOpts(str) {
  return (str || '').split('|').map(s => s.trim()).filter(Boolean);
}
function refreshChSelectOpts(input) {
  const row = input.closest('.ch-field-row');
  if (!row) return;
  const sel = row.querySelector('.ch-field-val');
  if (!sel || sel.tagName !== 'SELECT') return;
  const cur = sel.value;
  const opts = parseSelectOpts(input.value);
  sel.innerHTML = '<option value="">— Choisir —</option>'
    + opts.map(o => `<option${o===cur?' selected':''}>${escHtml(o)}</option>`).join('');
}

function parseDetails(json) {
  try {
    const parsed = JSON.parse(json || '[]');
    if (Array.isArray(parsed)) return parsed;
    // Ancien format {clé: valeur} → conversion
    return Object.entries(parsed).map(([k, v]) => ({libelle: k, valeur: v, unite: ''}));
  } catch(e) { return []; }
}

function fieldStyle(d) {
  if (d.style) return d.style;
  if (d.type === 'main') return 'text';
  if (d.type === 'aux')  return 'measure';
  return (d.unite && d.unite !== '') ? 'measure' : 'text';
}

async function saveChapter() {
  let type_item = document.getElementById('ch-type').value;
  if (type_item === '__new__') {
    type_item = document.getElementById('ch-type-custom').value.trim();
    if (!type_item) { toast('Entrez un nom pour la nouvelle catégorie','warning'); return; }
    saveCustomType(type_item);
  }
  const statut    = document.getElementById('ch-statut').value;
  const libelle   = document.getElementById('ch-libelle').value.trim();
  if (!libelle) { toast('Le titre du chapitre est requis', 'warning'); document.getElementById('ch-libelle')?.focus(); return; }
  const num_serie = document.getElementById('ch-serie')?.value.trim() || '';
  const details   = [];
  const _pendingDocUploads = [];
  document.querySelectorAll('#ch-fields-list .ch-field-row').forEach(row => {
    const style = row.dataset.style || 'text';
    const l = row.querySelector('.ch-field-label')?.value.trim();
    if (!l) return;
    let v = '', u = '';
    if (style === 'check') {
      v = row.querySelector('.ch-field-val')?.checked ? 'true' : 'false';
    } else if (style === 'measure' || style === 'select') {
      v = row.querySelector('.ch-field-val')?.value?.trim() || '';
      u = row.querySelector('.ch-field-unit')?.value?.trim() || '';
    } else if (style === 'document') {
      v = row.querySelector('.ch-field-val')?.value?.trim() || '';
      if (row._pendingFile) {
        _pendingDocUploads.push({ label: l, file: row._pendingFile });
        v = ''; // sera mis à jour après upload
      }
    } else {
      v = row.querySelector('.ch-field-val')?.value?.trim() || '';
    }
    details.push({style, libelle: l, valeur: v, unite: u});
  });
  const body = { type_item, statut, libelle, num_serie,
                 details_json: JSON.stringify(details),
                 ordre: editingChapterId ? undefined : state.currentItems.length };
  try {
    let saved;
    if (editingChapterId) {
      saved = await PUT(`/affaires/${state.currentAffaire.id}/items/${editingChapterId}`, body);
      const idx = state.currentItems.findIndex(x => x.id === editingChapterId);
      if (idx >= 0) state.currentItems[idx] = saved;
    } else {
      saved = await POST(`/affaires/${state.currentAffaire.id}/items`, body);
      state.currentItems.push(saved);
    }

    // Upload des fichiers document en attente
    if (_pendingDocUploads.length > 0) {
      let savedDetails = [...details];
      for (const doc of _pendingDocUploads) {
        try {
          const fd = new FormData();
          fd.append('file', doc.file, doc.file.name);
          const resp = await fetch(`${API_BASE}/affaires/${state.currentAffaire.id}/items/${saved.id}/files`, {method:'POST', body:fd});
          if (!resp.ok) throw new Error(await resp.text());
          const result = await resp.json();
          let docFileName = result.name;
          const suggested = computeNormalizedDocName(
            state.currentAffaire, {libelle, type_item}, doc.label, docFileName
          );
          const finalName = await renameDialog(docFileName, suggested);
          if (finalName && finalName !== docFileName) {
            try {
              const r = await api('POST',
                `/affaires/${state.currentAffaire.id}/items/${saved.id}/files/${encodeURIComponent(docFileName)}/rename`,
                {new_name: finalName});
              docFileName = r.name;
            } catch(_) {}
          }
          for (let i = 0; i < savedDetails.length; i++) {
            if (savedDetails[i].style === 'document' && savedDetails[i].libelle === doc.label && savedDetails[i].valeur === '') {
              savedDetails[i] = {...savedDetails[i], valeur: docFileName};
              break;
            }
          }
        } catch(e) { toast('Erreur upload « ' + doc.file.name + ' » : ' + e.message, 'error'); }
      }
      try {
        const updated = await PUT(`/affaires/${state.currentAffaire.id}/items/${saved.id}`,
          {details_json: JSON.stringify(savedDetails)});
        const idx2 = state.currentItems.findIndex(x => x.id === saved.id);
        if (idx2 >= 0) state.currentItems[idx2] = updated;
      } catch(_) {}
    }

    document.querySelector('.modal-overlay')?.remove();
    switchTab('chapitres');
    updateSidebarProgress();
    toast(editingChapterId ? 'Chapitre mis à jour' : 'Chapitre ajouté', 'success');
  } catch(e) { toast(e.message,'error'); }
}

/* ── Documents par chapitre ── */
async function loadChapterFiles(itemId) {
  const listEl = document.getElementById(`ch-file-list-${itemId}`);
  if (!listEl) return;
  listEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">Chargement…</div>';
  try {
    const files = await GET(`/affaires/${state.currentAffaire.id}/items/${itemId}/files`);
    if (!files.length) {
      listEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);font-style:italic">Aucun document</div>';
      return;
    }
    const icons = {pdf:'📕',doc:'📄',docx:'📄',xls:'📊',xlsx:'📊',
                   png:'🖼️',jpg:'🖼️',jpeg:'🖼️',zip:'📦',rar:'📦',txt:'📝'};
    listEl.innerHTML = files.map(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const icon = icons[ext] || '📄';
      const size = f.size > 1048576 ? (f.size/1048576).toFixed(1)+' Mo'
                 : f.size > 1024   ? (f.size/1024).toFixed(0)+' Ko'
                 : f.size + ' o';
      return `<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #f1f5f9">
        <span style="font-size:15px;flex-shrink:0">${icon}</span>
        <span style="flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;flex-shrink:0">${size}</span>
        <a href="${API_BASE}/affaires/${state.currentAffaire.id}/items/${itemId}/files/${encodeURIComponent(f.name)}"
           download="${escHtml(f.name)}" class="btn-icon" title="Télécharger" style="text-decoration:none;font-size:14px">⬇</a>
        <button class="btn-icon red no-print" onclick="chDeleteFile('${itemId}', ${JSON.stringify(f.name)})" title="Supprimer" style="font-size:12px">✕</button>
      </div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = `<div style="font-size:12px;color:var(--danger)">Erreur : ${escHtml(e.message)}</div>`;
  }
}

async function chUploadFiles(itemId, input) {
  const files = [...input.files];
  input.value = '';
  if (!files.length) return;
  const listEl = document.getElementById(`ch-file-list-${itemId}`);
  if (listEl) listEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">Envoi…</div>';
  let done = 0;
  for (const file of files) {
    try {
      const fd = new FormData();
      fd.append('file', file);
      const resp = await fetch(`${API_BASE}/affaires/${state.currentAffaire.id}/items/${itemId}/files`, {method:'POST', body: fd});
      if (!resp.ok) throw new Error(await resp.text());
      done++;
    } catch(e) { toast('Erreur upload ' + file.name + ' : ' + e.message, 'error'); }
  }
  await loadChapterFiles(itemId);
  if (done) toast(done + ' fichier' + (done > 1 ? 's' : '') + ' ajouté' + (done > 1 ? 's' : ''), 'success');
}

async function chDeleteFile(itemId, filename) {
  if (!window.confirm(`Supprimer "${filename}" ?`)) return;
  try {
    await fetch(`${API_BASE}/affaires/${state.currentAffaire.id}/items/${itemId}/files/${encodeURIComponent(filename)}`, {method:'DELETE'});
    await loadChapterFiles(itemId);
  } catch(e) { toast('Erreur suppression', 'error'); }
}

async function openChapterDossier(itemId) {
  try {
    if (!LOCAL_PORT || !DOSSIERS_ROOT) { toast('dossiers_root non configuré dans config.ini', 'error'); return; }
    const item = (state.currentAffaire.items || []).find(it => it.id === itemId);
    const slug = _slugify(item ? item.libelle : '');
    const clientPath = DOSSIERS_ROOT + '\\affaires\\' + state.currentAffaire.num_affaire + '\\' + slug;
    await fetch('http://127.0.0.1:' + LOCAL_PORT + '/open-folder?path=' + encodeURIComponent(clientPath), {mode:'no-cors'});
    toast('Dossier ouvert dans l\'explorateur', 'success', 2000);
  } catch(e) { toast('Impossible d\'ouvrir le dossier', 'error'); }
}

/* ── Champ Document : helpers ── */

function chDocFieldSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const row = input.closest('.ch-field-row');
  if (!row) return;
  const valInput = row.querySelector('.ch-field-val');
  if (valInput) valInput.value = file.name;
  row._pendingFile = file;
  const hint = row.querySelector('.ch-doc-hint');
  if (hint) hint.textContent = '⏳ Fichier prêt — sera déposé dans le dossier du chapitre à l\'enregistrement.';
  input.value = '';
}

function computeNormalizedDocName(affaire, chapter, fieldLabel, originalName) {
  const dotIdx = originalName.lastIndexOf('.');
  const ext = dotIdx >= 0 ? originalName.slice(dotIdx).toLowerCase() : '';
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const slugify = s => (s || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 28);
  return [
    slugify(affaire.num_affaire),
    slugify(chapter.libelle || chapter.type_item || 'chapitre'),
    slugify(fieldLabel || 'document'),
    date
  ].filter(Boolean).join('_') + ext;
}

function renameDialog(currentName, suggestedName) {
  return new Promise(res => {
    const el = document.createElement('div');
    el.className = 'confirm-overlay';
    el.style.zIndex = '300';
    el.innerHTML = `
      <div class="confirm-box" style="max-width:500px;text-align:left">
        <h3 style="margin-bottom:8px">📎 Nommer le document</h3>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">
          Fichier déposé : <code style="background:#f3f4f6;padding:1px 6px;border-radius:3px;font-size:12px">${escHtml(currentName)}</code>
        </p>
        <label class="form-label" style="margin-bottom:4px;display:block">Nom normalisé proposé — modifiable :</label>
        <input class="form-control" id="rn-input" value="${escHtml(suggestedName)}" style="margin-bottom:16px;font-size:13px">
        <div class="actions">
          <button class="btn btn-secondary" id="rn-skip">Garder le nom d'origine</button>
          <button class="btn btn-primary" id="rn-ok">✓ Renommer</button>
        </div>
      </div>`;
    document.body.appendChild(el);
    const finish = v => { el.remove(); res(v); };
    el.querySelector('#rn-ok').onclick = () => finish(el.querySelector('#rn-input').value.trim() || null);
    el.querySelector('#rn-skip').onclick = () => finish(null);
  });
}

async function openChDocRename(itemId, filename, chapterLibelle, fieldLabel) {
  const suggested = computeNormalizedDocName(
    state.currentAffaire, {libelle: chapterLibelle}, fieldLabel, filename
  );
  const finalName = await renameDialog(filename, suggested);
  if (!finalName || finalName === filename) return;
  try {
    const r = await api('POST',
      `/affaires/${state.currentAffaire.id}/items/${itemId}/files/${encodeURIComponent(filename)}/rename`,
      {new_name: finalName});
    const item = state.currentItems.find(x => x.id === itemId);
    if (item) {
      const details = parseDetails(item.details_json).map(d =>
        (d.style === 'document' && d.valeur === filename && d.libelle === fieldLabel)
          ? {...d, valeur: r.name} : d
      );
      const updated = await PUT(`/affaires/${state.currentAffaire.id}/items/${itemId}`,
        {details_json: JSON.stringify(details)});
      const idx = state.currentItems.findIndex(x => x.id === itemId);
      if (idx >= 0) state.currentItems[idx] = updated;
      switchTab('chapitres');
    }
    toast('Fichier renommé en « ' + r.name + ' »', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteChapter(id) {
  const ok = await confirm('Supprimer ce chapitre ?','Cette action est irréversible.');
  if(!ok) return;
  try {
    await DEL(`/affaires/${state.currentAffaire.id}/items/${id}`);
    state.currentItems = state.currentItems.filter(x => x.id !== id);
    switchTab('chapitres');
    updateSidebarProgress();
    toast('Chapitre supprimé','success');
  } catch(e) { toast(e.message,'error'); }
}

  if (!etat) return 'se-etat-default';

  if (e.startsWith('bon')) return 'se-etat-bon';
  if (e.startsWith('usag')) return 'se-etat-usage';
  if (e === 'hors service') return 'se-etat-hs';
  return 'se-etat-default';

async function saveSousEnsemble(moteurId, seId) {
  const libelle = document.getElementById('se-libelle').value.trim();
  if (!libelle) { toast('Le libellé est obligatoire','error'); return; }
  const data = {
    libelle,
    type:      (() => { const v = document.getElementById('se-type').value; return v === '__new__' ? document.getElementById('se-type-custom').value.trim() : v; })(),
    reference: document.getElementById('se-reference').value.trim(),
    marque:    document.getElementById('se-marque').value.trim(),
    num_serie: document.getElementById('se-num-serie').value.trim(),
    etat:      document.getElementById('se-etat').value,
    notes:     document.getElementById('se-notes').value.trim(),
  };
  try {
    if (seId) {
      await PUT(`/moteurs/${moteurId}/sous-ensembles/${seId}`, data);
    } else {
      await POST(`/moteurs/${moteurId}/sous-ensembles`, data);
    }
    document.querySelector('.modal-overlay')?.remove();
    await loadSousEnsembles(moteurId);
    toast(seId ? 'Sous-ensemble modifié' : 'Sous-ensemble ajouté', 'success');
    // Proposer la création d'un chapitre uniquement pour un nouveau sous-ensemble
    if (!seId) {
      const mObj = state.currentMoteurs.find(x => x.id === moteurId);
      const ok = await confirm(
        `Créer un chapitre pour "${data.libelle}" ?`,
        `Voulez-vous ajouter un chapitre à cette affaire pour ce sous-ensemble ?`
      );
      if (ok) {
        editingChapterId = null;
        openChapterModal({
          libelle:   data.libelle,
          type_item: data.type || '',
          num_serie: mObj?.num_serie || '',
        });
      }
    }
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteSousEnsemble(moteurId, seId) {
  const ok = await confirm('Supprimer ce sous-ensemble ?', 'Cette action est irréversible.');
  if (!ok) return;
  try {
    await DEL(`/moteurs/${moteurId}/sous-ensembles/${seId}`);
    await loadSousEnsembles(moteurId);
    toast('Sous-ensemble supprimé', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

  <div class="panel">
    <div class="panel-header"><span class="panel-title">🔨 Interventions liées</span></div>
    <div class="panel-body">
      ${intrvs.map(iv => `
        <div class="interv-item">

          <div class="interv-main">
            <div class="interv-title">${escHtml(iv.type_intervention||iv.description||'Intervention')}</div>

          </div>
          ${iv.statut ? statusBadge(iv.statut) : ''}
        </div>`).join('')}
    </div>
  </div>`;
}

// Convertit JJ/MM/AAAA ou YYYY-MM-DD → YYYY-MM-DD (pour type="date")
function toInputDate(s) {
  if (!s) return '';
  const m1 = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m1) return `${m1[3]}-${m1[2]}-${m1[1]}`;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return '';
}
// Convertit YYYY-MM-DD → JJ/MM/AAAA (pour la sauvegarde)
function fromInputDate(s) {
  if (!s) return '';
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return `${m[3]}/${m[2]}/${m[1]}`;
  return s;
}

function onTvaExonereChange(checked) {
  const tvaRow   = document.getElementById('af-tva-row');
  const tvaAlert = document.getElementById('af-tva-alert');
  if (tvaRow)   tvaRow.style.display   = checked ? 'none' : 'flex';
  if (tvaAlert) tvaAlert.style.display = checked ? 'flex' : 'none';
  updateTTC();
}
function updateTTC() {
  const ht = parseHT(document.getElementById('af-prix-ht')?.value);
  const tvaEl = document.getElementById('af-tva-amount');
  const ttcEl = document.getElementById('af-ttc-amount');
  if (!tvaEl || !ttcEl) return;
  if (!ht) { tvaEl.textContent = '—'; ttcEl.textContent = '—'; }
  else { tvaEl.textContent = fmtEur(ht * 0.20); ttcEl.textContent = fmtEur(ht * 1.20); }
  _echeances.forEach((_, i) => updateEcheanceReste(i));
  updateEcheancesTotal();
}

// ── Gestion des échéances de facturation ──
let _echeances = [];

function initEcheances(jsonStr) {
  try { _echeances = JSON.parse(jsonStr || '[]'); } catch(e) { _echeances = []; }
  renderEcheances();
}

function fmtModalite(e) {
  if (!e || !e.modalite) return '';
  if (e.modalite === 'comptant') return 'Comptant';
  if (e.modalite === 'jours')    return `${e.jours || '?'} jours`;
  if (e.modalite === 'jours_fm') return `${e.jours || '?'} jours fin de mois`;
  return e.modalite;
}

function renderEcheances() {
  const list = document.getElementById('echeances-list');
  if (!list) return;
  const ht  = parseHT(document.getElementById('af-prix-ht')?.value);
  const exo = document.getElementById('af-exonere-tva')?.checked;
  const base = ht ? (exo ? ht : ht * 1.20) : null;
  list.innerHTML = _echeances.map((e, i) => {
    const montantStade = base !== null ? base * (parseFloat(e.pourcentage) || 0) / 100 : null;
    const paye = parseFloat(e.montant_paye) || 0;
    const reste = montantStade !== null ? montantStade - paye : null;
    const resteColor = reste === null ? 'color:var(--text-muted)' : reste <= 0 ? 'color:#059669;font-weight:600' : 'color:#dc2626;font-weight:600';
    const showJours = e.modalite === 'jours' || e.modalite === 'jours_fm';
    const joursLabel = e.modalite === 'jours_fm' ? 'jours fin de mois' : 'jours';
    return `
    <div style="background:var(--gray-bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:7px">
      <div style="display:grid;grid-template-columns:2fr 0.65fr 1fr 1fr auto;gap:6px;align-items:center">
        <input class="form-control" style="font-size:13px" placeholder="Nom du stade (ex : Acompte, Livraison…)"
          value="${escHtml(e.stade||'')}" oninput="_echeances[${i}].stade=this.value">
        <div style="position:relative">
          <input class="form-control" style="font-size:13px;padding-right:22px" type="number" min="0" max="100" step="0.1"
            placeholder="%" value="${e.pourcentage||''}"
            oninput="_echeances[${i}].pourcentage=this.value;updateEcheanceReste(${i});updateEcheancesTotal()">
          <span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-muted);pointer-events:none">%</span>
        </div>
        <div style="position:relative">
          <input class="form-control" style="font-size:13px;padding-right:22px" type="number" min="0" step="0.01"
            placeholder="Payé" value="${e.montant_paye||''}"
            oninput="_echeances[${i}].montant_paye=this.value;updateEcheanceReste(${i});updateEcheancesTotal()">
          <span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-muted);pointer-events:none">€</span>
        </div>
        <div id="ech-reste-${i}" style="font-size:13px;text-align:right;padding:0 4px;${resteColor}" title="Reste à payer">${reste === null ? '—' : fmtEur(reste)}</div>
        <button type="button" onclick="removeEcheance(${i})"
          style="background:none;border:none;color:var(--danger);font-size:16px;padding:2px 4px;cursor:pointer;line-height:1" title="Supprimer">✕</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <select class="form-control" style="font-size:12px;width:auto;flex:0 0 auto"
          onchange="_echeances[${i}].modalite=this.value;toggleEcheanceJours(${i})">
          <option value="" ${!e.modalite?'selected':''}>— Modalité de paiement —</option>
          <option value="comptant" ${e.modalite==='comptant'?'selected':''}>Comptant</option>
          <option value="jours" ${e.modalite==='jours'?'selected':''}>À X jours</option>
          <option value="jours_fm" ${e.modalite==='jours_fm'?'selected':''}>À X jours fin de mois</option>
        </select>
        <div id="ech-jours-wrap-${i}" style="display:${showJours?'flex':'none'};align-items:center;gap:5px">
          <input id="ech-jours-${i}" class="form-control" type="number" min="1" style="font-size:12px;width:68px"
            placeholder="Ex: 30" value="${e.jours||''}"
            oninput="_echeances[${i}].jours=this.value">
          <span id="ech-jours-label-${i}" style="font-size:12px;color:var(--text-muted);white-space:nowrap">${joursLabel}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  updateEcheancesTotal();
}

function updateEcheanceReste(i) {
  const el = document.getElementById(`ech-reste-${i}`);
  if (!el) return;
  const ht  = parseHT(document.getElementById('af-prix-ht')?.value);
  const exo = document.getElementById('af-exonere-tva')?.checked;
  const base = ht ? (exo ? ht : ht * 1.20) : null;
  const e = _echeances[i];
  if (!e) return;
  const montantStade = base !== null ? base * (parseFloat(e.pourcentage) || 0) / 100 : null;
  const paye = parseFloat(e.montant_paye) || 0;
  const reste = montantStade !== null ? montantStade - paye : null;
  el.style.cssText = `font-size:13px;text-align:right;padding:0 4px;${reste === null ? 'color:var(--text-muted)' : reste <= 0 ? 'color:#059669;font-weight:600' : 'color:#dc2626;font-weight:600'}`;
  el.textContent = reste === null ? '—' : fmtEur(reste);
}

function toggleEcheanceJours(i) {
  const wrap  = document.getElementById(`ech-jours-wrap-${i}`);
  const label = document.getElementById(`ech-jours-label-${i}`);
  if (!wrap) return;
  const m = _echeances[i]?.modalite;
  wrap.style.display = (m === 'jours' || m === 'jours_fm') ? 'flex' : 'none';
  if (label) label.textContent = m === 'jours_fm' ? 'jours fin de mois' : 'jours';
}

function addEcheance() {
  _echeances.push({ stade: '', pourcentage: '', montant_paye: '', modalite: '', jours: '' });
  renderEcheances();
  const first = document.querySelector('#echeances-list > div:last-child input');
  if (first) first.focus();
}

function removeEcheance(i) {
  _echeances.splice(i, 1);
  renderEcheances();
}

function updateEcheancesTotal() {
  const totalEl = document.getElementById('echeances-total');
  if (!totalEl) return;
  if (!_echeances.length) { totalEl.style.display = 'none'; return; }
  const ht  = parseHT(document.getElementById('af-prix-ht')?.value);
  const exo = document.getElementById('af-exonere-tva')?.checked;
  const base = ht ? (exo ? ht : ht * 1.20) : null;
  const label = exo ? 'HT' : 'TTC';
  const totalPct   = _echeances.reduce((s,e) => s + (parseFloat(e.pourcentage)||0), 0);
  const totalPaye  = _echeances.reduce((s,e) => s + (parseFloat(e.montant_paye)||0), 0);
  const totalMont  = base !== null ? base * totalPct / 100 : null;
  const totalReste = totalMont !== null ? totalMont - totalPaye : null;
  const resteColor = totalReste === null ? '' : totalReste <= 0 ? 'color:#059669;font-weight:700' : 'color:#dc2626;font-weight:700';
  totalEl.style.display = 'flex';
  totalEl.innerHTML = `
    <span style="font-weight:600;color:var(--text-muted)">Total :</span>
    <span><strong>${totalPct.toFixed(1)} %</strong></span>
    ${totalMont !== null ? `<span>Montant ${label} : <strong>${fmtEur(totalMont)}</strong></span>` : ''}
    <span>Payé : <strong>${fmtEur(totalPaye)}</strong></span>
    ${totalReste !== null ? `<span style="${resteColor}">Reste ${label} : ${fmtEur(totalReste)}</span>` : ''}
    ${totalPct > 100 ? '<span style="color:#dc2626">⚠️ Total > 100 %</span>' : ''}
  `;
}

async function saveAffaire(id) {
  const body = {
    num_affaire:             document.getElementById('af-num').value.trim() || undefined,
    nom_projet:              document.getElementById('af-nom').value.trim(),
    client_id:               document.getElementById('af-client').value || undefined,
    fournisseur:             document.getElementById('af-fournisseur').value.trim(),
    navire_machine:          document.getElementById('af-navire').value.trim(),
    ref_interne:             document.getElementById('af-ref').value.trim(),
    num_commande_client:     document.getElementById('af-num-cmd').value.trim(),
    charge_affaire:          document.getElementById('af-charge').value.trim(),
    prix_ht:                 document.getElementById('af-prix-ht').value.trim(),
    exonere_tva:             document.getElementById('af-exonere-tva')?.checked ? 1 : 0,
    etablissement_financier: document.getElementById('af-ets-fin').value.trim(),
    date_achat:              fromInputDate(document.getElementById('af-achat').value),
    date_debut:              fromInputDate(document.getElementById('af-debut').value),
    date_fin_prevue:         fromInputDate(document.getElementById('af-fin').value),
    date_cloture:            fromInputDate(document.getElementById('af-cloture').value),
    statut:                  document.getElementById('af-statut').value,
    description:             document.getElementById('af-desc').value.trim(),
    commentaires:            document.getElementById('af-comm').value.trim(),
    echeances_facturation:   JSON.stringify(_echeances.filter(e => e.stade || e.pourcentage)),
    transporteur:            document.getElementById('af-transporteur').value.trim(),
    contact_transport:       document.getElementById('af-contact-transport').value.trim(),
    prix_transport:          document.getElementById('af-prix-transport').value.trim(),
    num_suivi_transport:     document.getElementById('af-num-suivi-transport').value.trim(),
    instructions_transport:  document.getElementById('af-instructions-transport').value.trim(),
  };
  if(!body.nom_projet) { toast('Le nom du projet est requis','warning'); return; }
  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled = true; btn.textContent = '…';
  try {
    if(id) {
      const updated = await PUT(`/affaires/${id}`, body);
      state.currentAffaire = updated;
      const idx = state.affaires.findIndex(a => a.id === id);
      if(idx>=0) state.affaires[idx] = {...state.affaires[idx], ...updated};
      toast('Affaire mise à jour','success');
    } else {
      const created = await POST('/affaires', body);
      state.affaires.unshift(created);
      toast('Affaire créée','success');
      state.currentId = created.id;
    }
    document.querySelector('.modal-overlay')?.remove();
    renderNav();
    if(id) renderAffaireDetail();
    else await loadAffaire(state.currentId);
  } catch(e) {
    toast(e.message,'error');
    btn.disabled = false; btn.textContent = '💾 Enregistrer';
  }
}

async function deleteAffaire() {
  document.querySelector('.modal-overlay')?.remove();
  const ok = await confirm('Supprimer cette affaire ?','Tous les chapitres associés seront supprimés. Cette action est irréversible.');
  if(!ok) return;
  try {
    await DEL(`/affaires/${state.currentAffaire.id}`);
    state.affaires = state.affaires.filter(a => a.id !== state.currentAffaire.id);
    state.currentAffaire = null;
    state.currentId = null;
    showAffaireList();
    toast('Affaire supprimée','success');
  } catch(e) { toast(e.message,'error'); }
}

async function downloadAffairePdf() {
  const a = state.currentAffaire;
  if (!a) return;
  const btn = document.querySelector('[onclick="downloadAffairePdf()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ PDF…'; }
  try {
    const resp = await fetch(`${API_BASE}/affaires/${a.id}/pdf`);
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(txt || resp.statusText);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `Affaire_${a.num_affaire.replace(/\//g,'-')}.pdf`;
    link.click();
    URL.revokeObjectURL(url);
    toast('PDF téléchargé', 'success');
  } catch(e) {
    toast('Erreur PDF : ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📄 PDF'; }
  }
}

async function saveComments() {
  const val = document.getElementById('comments-box')?.value || '';
  try {
    await PUT(`/affaires/${state.currentAffaire.id}`, { commentaires: val });
    state.currentAffaire.commentaires = val;
    toast('Commentaires enregistrés','success');
  } catch(e) { toast(e.message,'error'); }
}

function _tplRenderTypeList() {
  const el = document.getElementById('tpl-type-list');
  if (!el) return;
  const defaultKeys = Object.keys(_TYPE_FIELD_DEFAULTS);
  const allTypes = getAllTypes();

  el.innerHTML = allTypes.map((t, i) => {
    const isCustomized = !!_tplWorkingTypes[t];
    const isUserType   = !ITEM_TYPES.includes(t) && !defaultKeys.includes(t);
    const isActive     = _tplSelected === t;

    let badge = '';
    if (isCustomized) badge = '<span style="width:7px;height:7px;border-radius:50%;background:#2563eb;flex-shrink:0;display:inline-block"></span>';
    else if (isUserType) badge = '<span style="font-size:9px;color:#2563eb;font-weight:700">NEW</span>';

    let actionHtml = '';
    if (isCustomized && !isUserType) {
      actionHtml = '<button class="btn-icon tpl-action" data-idx="' + i + '" data-action="reset"'
        + ' title="Réinitialiser" style="font-size:12px;padding:1px 4px;opacity:0"'
        + ' onclick="event.stopPropagation();_tplActionBtn(this)">↺</button>';
    } else if (isUserType) {
      actionHtml = '<button class="btn-icon red tpl-action" data-idx="' + i + '" data-action="delete"'
        + ' title="Supprimer" style="font-size:11px;padding:1px 4px;opacity:0"'
        + ' onclick="event.stopPropagation();_tplActionBtn(this)">✕</button>';
    }

    return '<div class="tpl-type-item" data-idx="' + i + '"'
      + ' onclick="_tplClickItem(this)"'
      + ' style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:13px;border:1px solid '
      + (isActive ? '#bfdbfe' : 'transparent') + ';' + (isActive ? 'background:#eff6ff;' : '') + '"'
      + ' onmouseenter="const b=this.querySelector(\'.tpl-action\');if(b)b.style.opacity=\'1\'"'
      + ' onmouseleave="const b=this.querySelector(\'.tpl-action\');if(b)b.style.opacity=\'0\'">'
      + badge
      + '<span style="flex:1">' + escHtml(t) + '</span>'
      + actionHtml
      + '</div>';
  }).join('');

  // Store type names in a side array so onclick can retrieve by index
  el._typeIndex = allTypes;
}

function _tplClickItem(el) {
  const idx = parseInt(el.dataset.idx, 10);
  const list = document.getElementById('tpl-type-list');
  const typeName = list && list._typeIndex ? list._typeIndex[idx] : null;
  if (typeName != null) _tplSelectType(typeName);
}

function _tplActionBtn(btn) {
  const idx = parseInt(btn.dataset.idx, 10);
  const list = document.getElementById('tpl-type-list');
  const typeName = list && list._typeIndex ? list._typeIndex[idx] : null;
  if (typeName == null) return;
  if (btn.dataset.action === 'reset') _tplResetType(typeName);
  else if (btn.dataset.action === 'delete') _tplDeleteUserType(typeName);
}

function _tplSelectType(typeName) {
  _tplSelected = typeName;
  _tplRenderTypeList();

  const header   = document.getElementById('tpl-right-header');
  const fieldList = document.getElementById('tpl-field-list');
  const footer   = document.getElementById('tpl-footer');
  if (!header || !fieldList) return;

  const isUserType = !ITEM_TYPES.includes(typeName) && !Object.keys(_TYPE_FIELD_DEFAULTS).includes(typeName);
  const delBtn = isUserType
    ? '<button class="btn btn-sm" style="background:#fee2e2;color:#dc2626" onclick="_tplDeleteUserType(\''+typeName.replace(/'/g,"\'")+'\')">🗑 Supprimer</button>'
    : '';
  header.innerHTML = '<strong style="font-size:14px;flex:1">' + escHtml(typeName) + '</strong>' + delBtn;

  // Fields: prefer working copy, then default
  let fields = _tplWorkingTypes[typeName] || null;
  if (!fields) {
    const def = _TYPE_FIELD_DEFAULTS[typeName];
    fields = def ? def.map(([l, v, u]) => ({style: (u && u !== '') ? 'measure' : 'text', libelle: l, valeur: v || '', unite: u || ''})) : [];
  }
  _tplRenderFieldEditor(fields);
  if (footer) footer.style.display = 'flex';

  const hint = document.getElementById('tpl-hint');
  if (hint) hint.textContent = _tplWorkingTypes[typeName] ? 'Modèle personnalisé' : (Object.keys(_TYPE_FIELD_DEFAULTS).includes(typeName) ? 'Modèle par défaut (non modifié)' : 'Nouveau type utilisateur');
}

function _initRowDrag(containerId) {
  const c = document.getElementById(containerId);
  if (!c || c._dragInit) return;
  c._dragInit = true;
  let src = null;
  c.addEventListener('dragstart', e => {
    const row = e.target.closest('.tpl-field-row');
    if (!row) { e.preventDefault(); return; }
    src = row;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => src && src.classList.add('drag-fading'), 0);
  });
  c.addEventListener('dragend', () => {
    if (src) src.classList.remove('drag-fading');
    c.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
    src = null;
  });
  c.addEventListener('dragover', e => {
    e.preventDefault();
    const row = e.target.closest('.tpl-field-row');
    c.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
    if (row && row !== src) row.classList.add('drag-over');
  });
  c.addEventListener('drop', e => {
    e.preventDefault();
    const tgt = e.target.closest('.tpl-field-row');
    if (!tgt || tgt === src || !src) return;
    const rows = [...c.querySelectorAll('.tpl-field-row')];
    if (rows.indexOf(src) > rows.indexOf(tgt)) tgt.before(src);
    else tgt.after(src);
    tgt.classList.remove('drag-over');
  });
}

function _tplFieldRowHtml(libelle, valeur, unite, style) {
  // Normalise les anciennes valeurs 'main'/'aux'
  const st = style === 'main' ? 'text' : (style === 'aux' ? 'measure' : (style || 'text'));
  const showValUnit = st === 'measure';
  const showOpts    = st === 'select';
  return '<div class="details-row tpl-field-row" data-field-style="' + st + '" draggable="true" style="margin-bottom:6px">'
    + '<span class="tpl-drag-handle" title="Glisser pour réordonner">⠿</span>'
    + '<select class="form-control" style="width:116px;flex-shrink:0;font-size:12px;padding:4px 6px" onchange="_tplChangeStyle(this)">'
    + '<option value="text"'    + (st === 'text'    ? ' selected' : '') + '>📝 Texte</option>'
    + '<option value="measure"' + (st === 'measure' ? ' selected' : '') + '>📏 Mesure</option>'
    + '<option value="date"'    + (st === 'date'    ? ' selected' : '') + '>📅 Date</option>'
    + '<option value="check"'   + (st === 'check'   ? ' selected' : '') + '>✅ Coche</option>'
    + '<option value="select"'   + (st === 'select'   ? ' selected' : '') + '>📋 Liste</option>'
    + '<option value="document"' + (st === 'document' ? ' selected' : '') + '>📎 Document</option>'
    + '</select>'
    + '<input class="details-key" placeholder="Libellé" value="' + escHtml(libelle || '') + '" style="flex:2;min-width:80px">'
    + '<input class="details-val" placeholder="Valeur par défaut" value="' + escHtml(valeur || '') + '" style="flex:2;min-width:80px' + (showValUnit ? '' : ';display:none') + '">'
    + '<input class="details-unit" placeholder="' + (showOpts ? 'Opt 1 | Opt 2 | Opt 3' : 'Unité') + '" value="' + escHtml(unite || '') + '" style="flex:none;width:' + (showOpts ? '160px' : '70px') + (showValUnit || showOpts ? '' : ';display:none') + '">'
    + '<button class="btn-rm-detail" onclick="this.closest(\'.tpl-field-row\').remove()">✕</button>'
    + '</div>';
}

function _tplChangeStyle(sel) {
  const row = sel.closest('.tpl-field-row');
  if (!row) return;
  const st = sel.value;
  row.dataset.fieldStyle = st;
  const showValUnit = st === 'measure';
  const showOpts    = st === 'select';
  const inputs = row.querySelectorAll('input');
  if (inputs[1]) inputs[1].style.display = showValUnit ? '' : 'none';
  if (inputs[2]) {
    inputs[2].style.display = (showValUnit || showOpts) ? '' : 'none';
    inputs[2].style.width   = showOpts ? '160px' : '70px';
    inputs[2].placeholder   = showOpts ? 'Opt 1 | Opt 2 | Opt 3' : 'Unité';
  }
}

function _tplRenderFieldEditor(fields) {
  const el = document.getElementById('tpl-field-list');
  if (!el) return;
  if (!fields.length) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;margin-top:12px">Aucun champ — cliquez « + Champ » pour ajouter.</div>';
    return;
  }
  el.innerHTML = fields.map(f => _tplFieldRowHtml(f.libelle, f.valeur, f.unite, f.style || f.type || 'text')).join('');
  _initRowDrag('tpl-field-list');
}

function _tplAddField(type) {
  const el = document.getElementById('tpl-field-list');
  if (!el) return;
  if (!el.querySelector('.tpl-field-row')) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend', _tplFieldRowHtml('', '', '', type || 'aux'));
  const rows = el.querySelectorAll('.tpl-field-row');
  rows[rows.length - 1]?.querySelector('.details-key')?.focus();
  _initRowDrag('tpl-field-list');
}

function _tplSaveType() {
  if (!_tplSelected) return;
  const rows = document.querySelectorAll('#tpl-field-list .tpl-field-row');
  const fields = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const l = inputs[0]?.value.trim();
    const st = row.dataset.fieldStyle || 'text';
    if (l) {
      const field = {style: st, libelle: l, valeur: '', unite: ''};
      if (st === 'measure') {
        field.valeur = inputs[1]?.value.trim() || '';
        field.unite  = inputs[2]?.value.trim() || '';
      }
      fields.push(field);
    }
  });
  _tplWorkingTypes[_tplSelected] = fields;
  localStorage.setItem('ems_type_templates', JSON.stringify(_tplWorkingTypes));
  // Refresh display
  _tplRenderTypeList();
  _tplSelectType(_tplSelected);
  toast('Modèle "' + _tplSelected + '" enregistré', 'success');
}

function _tplNewType() {
  const name = window.prompt('Nom du nouveau type / catégorie :');
  if (!name || !name.trim()) return;
  const typeName = name.trim();
  if (!_tplWorkingTypes[typeName]) _tplWorkingTypes[typeName] = [];
  saveCustomType(typeName);  // adds to ems_chapter_types for the chapter modal dropdown
  localStorage.setItem('ems_type_templates', JSON.stringify(_tplWorkingTypes));
  _tplRenderTypeList();
  _tplSelectType(typeName);
}

function _tplResetType(typeName) {
  delete _tplWorkingTypes[typeName];
  localStorage.setItem('ems_type_templates', JSON.stringify(_tplWorkingTypes));
  _tplRenderTypeList();
  _tplSelectType(typeName);
  toast('Modèle "' + typeName + '" réinitialisé au défaut', 'info');
}

function _tplDeleteUserType(typeName) {
  if (!window.confirm('Supprimer définitivement le type "' + typeName + '" ?')) return;
  delete _tplWorkingTypes[typeName];
  // Remove from custom types
  try {
    const ct = JSON.parse(localStorage.getItem('ems_chapter_types') || '[]').filter(t => t !== typeName);
    localStorage.setItem('ems_chapter_types', JSON.stringify(ct));
  } catch(e) {}
  localStorage.setItem('ems_type_templates', JSON.stringify(_tplWorkingTypes));
  if (_tplSelected === typeName) {
    _tplSelected = null;
    const header = document.getElementById('tpl-right-header');
    const fieldList = document.getElementById('tpl-field-list');
    const footer = document.getElementById('tpl-footer');
    if (header) header.innerHTML = '<span style="color:var(--text-muted);font-size:13px">← Sélectionnez un type pour éditer ses champs</span>';
    if (fieldList) fieldList.innerHTML = '';
    if (footer) footer.style.display = 'none';
  }
  _tplRenderTypeList();
  toast('Type "' + typeName + '" supprimé', 'info');
}

    + '<div id="doc-dropzone"'
    + ' style="border:2px dashed var(--border);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px"'
    + ' ondragover="event.preventDefault();this.style.borderColor=\'#2563eb\';this.style.background=\'#eff6ff\'"'
    + ' ondragleave="this.style.borderColor=\'\';this.style.background=\'\'"'
    + ' ondrop="docHandleDrop(event)"'
    + ' onclick="document.getElementById(\'doc-file-input\').click()">'
    + '<div style="font-size:32px;margin-bottom:8px">📂</div>'
    + '<div style="font-size:14px;font-weight:500;color:var(--text-secondary)">Glisser des fichiers ici</div>'
    + '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">ou cliquer pour sélectionner</div>'
    + '<input id="doc-file-input" type="file" multiple style="display:none" onchange="docHandleInput(this)">'
    + '</div>'
    + '<div id="doc-upload-progress" style="display:none;margin-bottom:12px">'
    + '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px" id="doc-progress-label">Envoi…</div>'
    + '<div style="background:var(--gray-bg);border-radius:4px;height:6px"><div id="doc-progress-bar" style="background:#2563eb;height:6px;border-radius:4px;width:0%;transition:width .3s"></div></div>'
    + '</div>'
    + '<div id="doc-file-list" style="display:flex;flex-direction:column;gap:6px"></div>'
    + '</div>';

  await docLoadFiles();
}

async function docLoadFiles() {
  const id = state.currentId;
  const listEl = document.getElementById('doc-file-list');
  if (!listEl || !id) return;
  try {
    const files = await GET('/affaires/' + id + '/files');
    if (!files.length) {
      listEl.innerHTML = '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">Aucun fichier dans ce dossier.</div>';
      return;
    }
    listEl.innerHTML = files.map(f => {
      const size = f.size > 1048576 ? (f.size/1048576).toFixed(1)+' Mo'
                 : f.size > 1024 ? (f.size/1024).toFixed(0)+' Ko'
                 : f.size + ' o';
      const d = new Date(f.modified * 1000).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const ext = f.name.split('.').pop().toLowerCase();
      const icon = {pdf:'📕',doc:'📄',docx:'📄',xls:'📊',xlsx:'📊',
                    png:'🖼️',jpg:'🖼️',jpeg:'🖼️',
                    zip:'📦',rar:'📦',txt:'📝'}[ext] || '📄';
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg)">'
        + '<span style="font-size:22px;flex-shrink:0">' + icon + '</span>'
        + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(f.name) + '</div>'
        + '<div style="font-size:11px;color:var(--text-muted)">' + size + ' · ' + d + '</div>'
        + '</div>'
        + '<a href="' + API_BASE + '/affaires/' + id + '/files/' + encodeURIComponent(f.name) + '" download="' + escHtml(f.name) + '" class="btn btn-secondary btn-xs" style="text-decoration:none">↓</a>'
        + '<button class="btn-icon red btn-xs" onclick="docDeleteFile(' + JSON.stringify(f.name) + ')" title="Supprimer">✕</button>'
        + '</div>';
    }).join('');
  } catch(e) {
    listEl.innerHTML = '<div style="color:var(--danger);font-size:13px">Erreur chargement: ' + escHtml(e.message) + '</div>';
  }
}

async function docUploadFiles(files) {
  const id = state.currentId;
  if (!id || !files.length) return;
  const prog = document.getElementById('doc-upload-progress');
  const bar  = document.getElementById('doc-progress-bar');
  const lbl  = document.getElementById('doc-progress-label');
  if (prog) prog.style.display = 'block';
  let done = 0;
  for (const file of files) {
    if (lbl) lbl.textContent = 'Envoi de ' + file.name + '… (' + (done+1) + '/' + files.length + ')';
    try {
      const fd = new FormData();
      fd.append('file', file);
      const resp = await fetch(API_BASE + '/affaires/' + id + '/files', {method:'POST', body: fd});
      if (!resp.ok) throw new Error(await resp.text());
    } catch(e) { toast('Erreur upload ' + file.name + ': ' + e.message, 'error'); }
    done++;
    if (bar) bar.style.width = (done / files.length * 100) + '%';
  }
  if (prog) { prog.style.display = 'none'; if (bar) bar.style.width = '0%'; }
  await docLoadFiles();
  toast(done + ' fichier' + (done > 1 ? 's' : '') + ' envoyé' + (done > 1 ? 's' : ''), 'success');
}

function docHandleDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('doc-dropzone');
  if (dz) { dz.style.borderColor = ''; dz.style.background = ''; }
  const files = [...e.dataTransfer.files];
  if (files.length) docUploadFiles(files);
}

function docHandleInput(input) {
  const files = [...input.files];
  input.value = '';
  if (files.length) docUploadFiles(files);
}

async function docDeleteFile(name) {
  if (!window.confirm('Supprimer "' + name + '" ?')) return;
  try {
    await fetch(API_BASE + '/affaires/' + state.currentId + '/files/' + encodeURIComponent(name), {method:'DELETE'});
    await docLoadFiles();
  } catch(e) { toast('Erreur suppression', 'error'); }
}

async function openDossier() {
  if (!state.currentId || !state.currentAffaire) return;
  try {
    if (!LOCAL_PORT || !DOSSIERS_ROOT) { toast('dossiers_root non configuré dans config.ini', 'error'); return; }
    const clientPath = DOSSIERS_ROOT + '\\affaires\\' + state.currentAffaire.num_affaire;
    await fetch('http://127.0.0.1:' + LOCAL_PORT + '/open-folder?path=' + encodeURIComponent(clientPath), {mode:'no-cors'});
    toast('Dossier ouvert dans l\'explorateur', 'success', 2000);
  } catch(e) { toast('Impossible d\'ouvrir le dossier', 'error'); }
}


/* ═══════════════════════════════════════════════
   TABLEAU BLANC
═══════════════════════════════════════════════ */
let _wbSaveTimer = null;

function renderWhiteboardTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  const a = state.currentAffaire;
  const content = (a && a.whiteboard) ? a.whiteboard : '';

  el.innerHTML = `
<div id="wb-container">
  <div id="wb-toolbar" style="display:flex;flex-wrap:wrap;align-items:center;gap:3px;padding:6px 10px;background:var(--gray-bg);border:1px solid var(--border);border-radius:8px 8px 0 0;border-bottom:none">
    <button class="wb-btn" onclick="wbCmd('bold')" title="Gras (Ctrl+B)"><b>B</b></button>
    <button class="wb-btn" onclick="wbCmd('italic')" title="Italique (Ctrl+I)"><i>I</i></button>
    <button class="wb-btn" onclick="wbCmd('underline')" title="Souligné (Ctrl+U)"><u>U</u></button>
    <span style="width:1px;height:18px;background:var(--border);margin:0 4px;display:inline-block"></span>
    <button class="wb-btn" onclick="wbCmd('formatBlock','h2')" title="Titre">H1</button>
    <button class="wb-btn" onclick="wbCmd('formatBlock','h3')" title="Sous-titre">H2</button>
    <button class="wb-btn" onclick="wbCmd('formatBlock','p')" title="Paragraphe normal">¶</button>
    <span style="width:1px;height:18px;background:var(--border);margin:0 4px;display:inline-block"></span>
    <button class="wb-btn" onclick="wbCmd('insertUnorderedList')" title="Liste à puces">• liste</button>
    <button class="wb-btn" onclick="wbCmd('insertOrderedList')" title="Liste numérotée">1. liste</button>
    <span style="width:1px;height:18px;background:var(--border);margin:0 4px;display:inline-block"></span>
    <button class="wb-btn" onclick="wbInsertHR()" title="Trait séparateur">── ──</button>
    <button class="wb-btn" onclick="wbInsertImage()" title="Insérer une image depuis le disque">🖼 Image</button>
    <span style="flex:1"></span>
    <span id="wb-save-status" style="font-size:11px;color:var(--text-muted);padding:0 6px;white-space:nowrap"></span>
    <button class="wb-btn wb-btn-danger" onclick="wbClear()" title="Effacer tout">🗑</button>
  </div>
  <div id="wb-editor"
       contenteditable="true"
       spellcheck="true"
       style="min-height:460px;border:1px solid var(--border);border-radius:0 0 8px 8px;padding:18px 22px;font-size:14px;line-height:1.75;overflow-y:auto;background:var(--bg);outline:none;cursor:text;word-break:break-word"
  >${content || '<p><br></p>'}</div>
  <div style="font-size:11px;color:var(--text-muted);margin-top:6px;padding-left:2px">
    💡 Coller des captures d'écran directement avec <kbd style="background:var(--gray-bg);border:1px solid var(--border);border-radius:3px;padding:0 4px">Ctrl+V</kbd> · Les modifications sont sauvegardées automatiquement.
  </div>
  <input type="file" id="wb-file-input" accept="image/*" style="display:none" onchange="wbHandleFileInput(this)">
</div>`;

  const editor = document.getElementById('wb-editor');
  if (!editor) return;
  editor.addEventListener('paste', wbHandlePaste);
  editor.addEventListener('input', wbScheduleSave);
  // Click sur image → sélectionner pour supprimer facilement
  editor.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') {
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNode(e.target);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });
}

function wbCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('wb-editor')?.focus();
  wbScheduleSave();
}

function wbInsertHR() {
  document.execCommand('insertHTML', false,
    '<hr style="border:none;border-top:2px solid var(--border);margin:14px 0">');
  document.getElementById('wb-editor')?.focus();
  wbScheduleSave();
}

function wbInsertImage() {
  document.getElementById('wb-file-input')?.click();
}

function wbHandleFileInput(input) {
  const file = input.files[0];
  input.value = '';
  if (!file || !file.type.startsWith('image/')) return;
  wbEmbedBlob(file);
}

function wbHandlePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      wbEmbedBlob(item.getAsFile());
      return;
    }
  }
}

function wbEmbedBlob(blob) {
  if (!blob) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const editor = document.getElementById('wb-editor');
    if (!editor) return;
    editor.focus();
    document.execCommand('insertHTML', false,
      `<img src="${ev.target.result}" style="max-width:100%;border-radius:6px;margin:6px 0;display:block" alt="">`);
    wbScheduleSave();
  };
  reader.readAsDataURL(blob);
}

function wbClear() {
  if (!window.confirm('Effacer tout le contenu du tableau blanc ?')) return;
  const editor = document.getElementById('wb-editor');
  if (!editor) return;
  editor.innerHTML = '<p><br></p>';
  wbScheduleSave();
}

function wbScheduleSave() {
  const statusEl = document.getElementById('wb-save-status');
  if (statusEl) statusEl.textContent = 'Modification…';
  clearTimeout(_wbSaveTimer);
  _wbSaveTimer = setTimeout(wbSave, 1500);
}

async function wbSave() {
  if (!state.currentId) return;
  const editor = document.getElementById('wb-editor');
  if (!editor) return;
  const html = editor.innerHTML;
  const statusEl = document.getElementById('wb-save-status');
  if (statusEl) statusEl.textContent = 'Sauvegarde…';
  try {
    await PUT('/affaires/' + state.currentId, { whiteboard: html });
    if (state.currentAffaire) state.currentAffaire.whiteboard = html;
    if (statusEl) {
      statusEl.textContent = 'Enregistré ✓';
      setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2500);
    }
  } catch(e) {
    if (statusEl) statusEl.textContent = '⚠ Erreur';
    toast('Erreur sauvegarde tableau blanc', 'error');
  }
}


</script>
